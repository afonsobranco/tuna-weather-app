<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Tuna Weather App icon">
  <defs>

    <!-- Clip to rounded square (22.5% radius matches iOS icon spec) -->
    <clipPath id="ic-clip">
      <rect width="100" height="100" rx="22.5" ry="22.5"/>
    </clipPath>

    <!-- Background: deep-water diagonal gradient (replicates CSS 160deg) -->
    <linearGradient id="ic-bg" x1="0%" y1="0%" x2="67%" y2="100%">
      <stop offset="0%"   stop-color="#6ED3E8"/>
      <stop offset="35%"  stop-color="#2E8FCC"/>
      <stop offset="70%"  stop-color="#1A4E8A"/>
      <stop offset="100%" stop-color="#0B1E3B"/>
    </linearGradient>

    <!-- Light shaft fade -->
    <linearGradient id="ic-shaft" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Sun-glint radial (top-right corner) -->
    <radialGradient id="ic-glint" cx="72%" cy="12%" r="38%">
      <stop offset="0%"   stop-color="#fff9e0" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#ffc878" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffc878" stop-opacity="0"/>
    </radialGradient>

    <!-- Tuna body gradient (belly→back, vertical) -->
    <linearGradient id="ic-body" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#F5F8FB"/>
      <stop offset="45%"  stop-color="#C8D6E2"/>
      <stop offset="55%"  stop-color="#5F7A92"/>
      <stop offset="100%" stop-color="#243A55"/>
    </linearGradient>

    <!-- Tuna dorsal / tail gradient -->
    <linearGradient id="ic-back" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1B3556"/>
      <stop offset="100%" stop-color="#3A5C82"/>
    </linearGradient>

    <!-- Inset top-highlight (matches glassmorphism card recipe) -->
    <linearGradient id="ic-inset" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

  </defs>

  <g clip-path="url(#ic-clip)">

    <!-- ── Background ─────────────────────────────────────────── -->
    <rect width="100" height="100" fill="url(#ic-bg)"/>

    <!-- ── Sun glint ──────────────────────────────────────────── -->
    <rect width="100" height="100" fill="url(#ic-glint)"/>

    <!-- ── Three diagonal light shafts ───────────────────────── -->
    <g opacity="0.35">
      <polygon points="20,0 30,0 14,100 0,100"    fill="url(#ic-shaft)"/>
      <polygon points="60,0 72,0 50,100 38,100"   fill="url(#ic-shaft)"/>
      <polygon points="92,0 100,0 100,80 80,100"  fill="url(#ic-shaft)"/>
    </g>

    <!-- ── Tuna fish ───────────────────────────────────────────── -->

    <!-- Pectoral fin (rendered behind body) -->
    <path
      d="M 40 56 C 36 64, 32 70, 28 72 C 30 66, 33 60, 36 56 Z"
      fill="#1B3556"
      opacity="0.85"
    />

    <!-- Main body — football silhouette -->
    <path
      d="M 8 56
         C 14 36, 38 30, 58 36
         C 70 39, 80 45, 88 50
         C 88 50, 92 52, 90 55
         C 85 60, 78 64, 70 67
         C 55 72, 28 72, 14 64
         C 10 62, 6 60, 8 56 Z"
      fill="url(#ic-body)"
    />

    <!-- Dorsal shading stripe -->
    <path
      d="M 12 54
         C 18 40, 38 36, 58 41
         C 72 44, 82 48, 88 51
         C 80 47, 68 44, 56 43
         C 38 41, 22 46, 14 56 Z"
      fill="url(#ic-back)"
    />

    <!-- Three spiky dorsal fins -->
    <path d="M 28 38 L 32 30 L 34 38 Z" fill="#1B3556"/>
    <path d="M 36 36 L 39 31 L 41 37 Z" fill="#1B3556"/>
    <path d="M 43 35 L 46 31 L 48 36 Z" fill="#1B3556"/>

    <!-- Yellow finlets — top (signature of Atlantic bluefin) -->
    <path d="M 55 41 l 2 -2 l 1 2 z" fill="#FFD45A"/>
    <path d="M 60 42 l 2 -2 l 1 2 z" fill="#FFD45A"/>
    <path d="M 65 43 l 2 -2 l 1 2 z" fill="#FFD45A"/>

    <!-- Yellow finlets — bottom -->
    <path d="M 55 67 l 2  2 l 1 -2 z" fill="#FFD45A"/>
    <path d="M 60 68 l 2  2 l 1 -2 z" fill="#FFD45A"/>
    <path d="M 65 67 l 2  2 l 1 -2 z" fill="#FFD45A"/>

    <!-- Crescent tail -->
    <path
      d="M 86 50
         C 92 42, 96 38, 98 36
         C 98 42, 96 48, 94 52
         C 96 56, 98 62, 98 68
         C 96 66, 92 62, 86 56 Z"
      fill="url(#ic-back)"
    />

    <!-- Eye -->
    <circle cx="20" cy="51" r="2.4" fill="#0B1E3B"/>
    <circle cx="19.3" cy="50.3" r="0.8" fill="#ffffff" opacity="0.90"/>

    <!-- Gill line -->
    <path
      d="M 28 47 C 27 52, 27 58, 29 62"
      stroke="#1B3556"
      stroke-width="0.7"
      fill="none"
      opacity="0.60"
    />

    <!-- Belly highlight -->
    <path
      d="M 22 62 C 36 68, 56 68, 72 64"
      stroke="rgba(255,255,255,0.35)"
      stroke-width="0.8"
      fill="none"
    />

    <!-- ── Icon-glass: subtle top-edge highlight ──────────────── -->
    <rect width="100" height="100" fill="url(#ic-inset)" rx="22.5" ry="22.5"/>

  </g>
</svg>
