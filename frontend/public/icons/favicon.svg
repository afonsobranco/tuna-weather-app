<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Tuna Weather favicon">
  <!--
    Favicon variant — optimised for 16×32px rendering.
    Simplified to 3 elements: background + body blob + eye.
    Detail (fins, gill, finlets) is retained but stroke-widths
    are tuned so they survive anti-aliasing at 16px.
  -->
  <defs>

    <clipPath id="fv-clip">
      <rect width="32" height="32" rx="7" ry="7"/>
    </clipPath>

    <linearGradient id="fv-bg" x1="0%" y1="0%" x2="67%" y2="100%">
      <stop offset="0%"   stop-color="#5CC8E0"/>
      <stop offset="40%"  stop-color="#1E7DC0"/>
      <stop offset="75%"  stop-color="#123F7A"/>
      <stop offset="100%" stop-color="#070F26"/>
    </linearGradient>

    <linearGradient id="fv-body" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#EBF2F8"/>
      <stop offset="45%"  stop-color="#9FBACF"/>
      <stop offset="100%" stop-color="#2A4A66"/>
    </linearGradient>

    <linearGradient id="fv-back" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#162E4E"/>
      <stop offset="100%" stop-color="#2E5070"/>
    </linearGradient>

    <radialGradient id="fv-glint" cx="75%" cy="12%" r="35%">
      <stop offset="0%"   stop-color="#fff5d0" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#fff5d0" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <g clip-path="url(#fv-clip)">

    <!-- Background -->
    <rect width="32" height="32" fill="url(#fv-bg)"/>
    <rect width="32" height="32" fill="url(#fv-glint)"/>

    <!-- Single light shaft (readable even at 16px) -->
    <polygon points="18,0 22,0 14,32 8,32" fill="white" opacity="0.18"/>

    <!-- ── Tuna body (scaled to 32×32 canvas) ── -->
    <!-- Body: original 100×100 coords × 0.32 -->
    <path
      d="M 2.6 17.9
         C 4.5 11.5, 12.2 9.6, 18.6 11.5
         C 22.4 12.5, 25.6 14.4, 28.2 16.0
         C 28.2 16.0, 29.4 16.6, 28.8 17.6
         C 27.2 19.2, 24.9 20.5, 22.4 21.4
         C 17.6 23.0, 9.0 23.0, 4.5 20.5
         C 3.2 19.8, 2.0 19.2, 2.6 17.9 Z"
      fill="url(#fv-body)"
    />

    <!-- Dorsal stripe -->
    <path
      d="M 3.8 17.3
         C 5.8 12.8, 12.2 11.5, 18.6 13.1
         C 23.0 14.1, 26.2 15.4, 28.2 16.3
         C 25.6 15.0, 21.8 14.1, 17.9 13.8
         C 12.2 13.1, 7.0 14.7, 4.5 17.9 Z"
      fill="url(#fv-back)"
    />

    <!-- Dorsal fins (3 spikes, simplified) -->
    <path d="M 9.0 12.2 L 10.2 9.6 L 10.9 12.2 Z"  fill="#162E4E"/>
    <path d="M 11.5 11.5 L 12.5 9.9 L 13.1 11.8 Z" fill="#162E4E"/>
    <path d="M 13.8 11.2 L 14.7 9.9 L 15.4 11.5 Z" fill="#162E4E"/>

    <!-- Yellow finlets (top, 3) -->
    <path d="M 17.6 13.1 l 0.6 -0.6 l 0.3 0.6 z" fill="#FFD45A"/>
    <path d="M 19.2 13.4 l 0.6 -0.6 l 0.3 0.6 z" fill="#FFD45A"/>
    <path d="M 20.8 13.8 l 0.6 -0.6 l 0.3 0.6 z" fill="#FFD45A"/>

    <!-- Yellow finlets (bottom, 3) -->
    <path d="M 17.6 21.4 l 0.6  0.6 l 0.3 -0.6 z" fill="#FFD45A"/>
    <path d="M 19.2 21.8 l 0.6  0.6 l 0.3 -0.6 z" fill="#FFD45A"/>
    <path d="M 20.8 21.4 l 0.6  0.6 l 0.3 -0.6 z" fill="#FFD45A"/>

    <!-- Tail -->
    <path
      d="M 27.5 16.0
         C 29.4 13.4, 30.7 12.2, 31.4 11.5
         C 31.4 13.4, 30.7 15.4, 30.1 16.6
         C 30.7 17.9, 31.4 19.8, 31.4 21.8
         C 30.7 21.1, 29.4 20.2, 27.5 17.9 Z"
      fill="url(#fv-back)"
    />

    <!-- Eye (the one detail that scales worst — keep it large-ish) -->
    <circle cx="6.4" cy="16.3" r="1.2" fill="#0A1A30"/>
    <circle cx="6.2" cy="16.1" r="0.5" fill="#ffffff" opacity="0.90"/>

  </g>
</svg>
